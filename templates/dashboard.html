<!-- templates/dashboard.html -->

<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Stock Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{{ theme }}">
    <div class="theme-toggle">
        <button onclick="window.location.href='{{ url_for("toggle_theme") }}';">Switch Theme</button>
    </div>
    <div class="container">
        <h1>Dashboard<span class="blinking-cursor">|</span></h1>
        <h2>Welcome, {{ username }}</h2>
        <p><a href="{{ url_for('home') }}">Home</a> | <a href="{{ url_for('preferences') }}">Preferences</a> | <a href="{{ url_for('logout') }}">Logout</a></p>
        <p><a href="{{ url_for('create_portfolio') }}">Create Portfolio</a></p>
        <h3>Your Portfolios:</h3>
        <ul>
            {% for portfolio in current_user.portfolios %}
            <li><a href="{{ url_for('portfolio', portfolio_id=portfolio.id) }}">{{ portfolio.name }}</a></li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
