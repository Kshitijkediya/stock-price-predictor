<!-- templates/preferences.html -->

<!DOCTYPE html>
<html>
<head>
    <title>Preferences - Stock Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{{ theme }}">
    <div class="theme-toggle">
        <button onclick="window.location.href='{{ url_for("toggle_theme") }}';">Switch Theme</button>

    </div>
    <div class="container">
        <h1>Preferences<span class="blinking-cursor">|</span></h1>
        <form method="POST">
            <label for="preferences">Set Your Preferences:</label><br>
            <textarea id="preferences" name="preferences" rows="10" cols="50">{{ preferences }}</textarea><br><br>
            <input type="submit" value="Save Preferences">
        </form>
        <p><a href="{{ url_for('home') }}">Home</a> | <a href="{{ url_for('dashboard') }}">Dashboard</a> | <a href="{{ url_for('logout') }}">Logout</a></p>
    </div>
</body>
</html>
